film: carnival-night
source_lang: Russian
target_lang: English
trans_model: gpt-5.2
eval_model: gpt-5.4-mini
temperature: 0.8
eval_runs: 4
eval_prompt: films/prompts/eval/mqm-memes.txt
variance_delta: 0.05

methods:
  - name: zero
    n_runs: 4

  - name: zero-lang
    n_runs: 4
    lang_prompt: true

  - name: characters
    n_runs: 4
    prompt: films/prompts/characters.txt
    summary: films/data/carnival-night/summaries/characters.txt

  - name: characters-lang
    n_runs: 4
    prompt: films/prompts/characters.txt
    summary: films/data/carnival-night/summaries/characters.txt
    lang_prompt: true

  - name: list
    n_runs: 4
    prompt: films/prompts/unit-list.txt
    unit_list: films/data/carnival-night/meme-list.json

  - name: list-lang
    n_runs: 4
    prompt: films/prompts/unit-list.txt
    unit_list: films/data/carnival-night/meme-list.json
    lang_prompt: true

  - name: list-analysis
    n_runs: 4
    prompt: films/prompts/list-analysis.txt
    unit_list: films/data/carnival-night/meme-list-analysis.json

  - name: list-analysis-lang
    n_runs: 4
    prompt: films/prompts/list-analysis.txt
    unit_list: films/data/carnival-night/meme-list-analysis.json
    lang_prompt: true

  - name: narratives
    n_runs: 4
    prompt: films/prompts/narratives.txt
    summary: films/data/carnival-night/summaries/narratives.txt

  - name: noise
    n_runs: 4

  - name: given
    n_runs: 4
    prompt: films/prompts/given-translations.txt
    given_trans: films/data/carnival-night/reference.json

  - name: given-lang
    n_runs: 4
    prompt: films/prompts/given-translations.txt
    given_trans: films/data/carnival-night/reference.json
    lang_prompt: true
